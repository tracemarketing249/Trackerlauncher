<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace AgTech — Link Launcher</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fffdf7;
    --surface: #ffffff;
    --surface2: #fef9ec;
    --border: rgba(230, 160, 20, 0.15);
    --border-hover: rgba(230, 160, 20, 0.4);
    --text: #1a1500;
    --muted: #9a8a5a;
    --accent: #f5a800;
    --accent2: #f47b00;
    --accent-dim: rgba(245, 168, 0, 0.1);
    --accent-dim2: rgba(245, 168, 0, 0.05);
    --danger: #e05a2b;
    --danger-dim: rgba(224, 90, 43, 0.08);
    --radius: 14px;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-display);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle dot pattern bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(245,168,0,0.12) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 880px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 44px;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo-area { display: flex; align-items: center; gap: 0; }

  .logo-area img {
    height: 52px;
    width: auto;
    object-fit: contain;
  }

  .header-right { text-align: right; }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .tagline {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
  }

  /* Hero strip */
  .hero {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .hero-text h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .hero-text p {
    font-family: var(--font-mono);
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    margin-top: 6px;
    font-weight: 300;
  }

  .hero-stats {
    display: flex;
    gap: 16px;
  }

  .stat {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 10px;
    padding: 12px 20px;
    text-align: center;
    min-width: 72px;
  }

  .stat-val {
    font-size: 24px;
    font-weight: 800;
    color: #fff;
    line-height: 1;
    display: block;
  }

  .stat-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: block;
    margin-top: 3px;
  }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
    box-shadow: 0 2px 20px rgba(245,168,0,0.08);
  }

  .table-header {
    display: grid;
    grid-template-columns: 1fr 2fr 48px;
    padding: 10px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .col-label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .row-list { min-height: 60px; }

  .link-row {
    display: grid;
    grid-template-columns: 1fr 2fr 48px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    animation: rowIn 0.22s ease;
  }

  @keyframes rowIn {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .link-row:last-child { border-bottom: none; }
  .link-row:hover { background: var(--accent-dim2); }

  .link-row input {
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    padding: 14px 20px;
    width: 100%;
    transition: color 0.15s;
  }

  .link-row input::placeholder { color: #c9b888; font-weight: 400; }
  .link-row input:focus { color: var(--accent2); }

  .link-row .url-input {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 400;
    border-left: 1px solid var(--border);
  }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #c9b888;
    display: flex;
    align-items: center;
    justify-content: center;
    border-left: 1px solid var(--border);
    transition: color 0.15s, background 0.15s;
    width: 48px;
  }
  .del-btn:hover { color: var(--danger); background: var(--danger-dim); }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 13px;
    display: none;
  }

  /* Actions */
  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    padding: 11px 22px;
    border-radius: 9px;
    cursor: pointer;
    border: 1.5px solid var(--border);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.01em;
  }

  .btn-add {
    background: var(--surface);
    color: var(--text);
    border-color: var(--border-hover);
  }
  .btn-add:hover { background: var(--surface2); border-color: var(--accent); }

  .btn-save {
    background: var(--surface);
    color: var(--accent2);
    border-color: rgba(245,168,0,0.3);
  }
  .btn-save:hover { background: var(--accent-dim); border-color: var(--accent); }

  .btn-launch {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff;
    border: none;
    margin-left: auto;
    box-shadow: 0 4px 14px rgba(245,168,0,0.3);
  }
  .btn-launch:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(245,168,0,0.4);
  }
  .btn-launch:active { transform: translateY(0); }

  .btn-refresh {
    background: var(--surface);
    color: #1a7a3a;
    border-color: rgba(26,122,58,0.25);
  }
  .btn-refresh:hover { background: rgba(26,122,58,0.06); border-color: rgba(26,122,58,0.5); }

  .btn-close {
    background: var(--surface);
    color: var(--danger);
    border-color: rgba(224,90,43,0.25);
  }
  .btn-close:hover { background: var(--danger-dim); border-color: var(--danger); }

  .divider-line {
    width: 1px;
    height: 28px;
    background: var(--border);
    margin: 0 4px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    border-radius: 9px;
    padding: 10px 22px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Footer */
  .footer-note {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.35; transform: scale(0.75); }
  }

  @media (max-width: 600px) {
    .page { padding: 32px 16px 60px; }
    .table-header, .link-row { grid-template-columns: 1fr 1.5fr 40px; }
    .btn-launch { margin-left: 0; width: 100%; justify-content: center; }
    .hero { flex-direction: column; }
    .hero-stats { width: 100%; justify-content: flex-start; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo-area">
      <img src="https://raw.githubusercontent.com/tracemarketing249/Trackerlauncher/main/logo.png" alt="Trace AgTech Logo">
    </div>

    <div class="header-right">
      <div class="eyebrow">Link Launcher</div>
      <div class="tagline">Client Portal Access</div>
    </div>
  </header>

  <div class="hero">
    <div class="hero-text">
      <h1>Open all clients<br>at once.</h1>
      <p>// add client names + links → hit launch → all tabs open instantly</p>
    </div>
    <div class="hero-stats">
      <div class="stat">
        <span class="stat-val" id="count">0</span>
        <span class="stat-label">Clients</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="valid-count">0</span>
        <span class="stat-label">Ready</span>
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <div class="col-label">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/></svg>
        Client name
      </div>
      <div class="col-label">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 5h8M6 2l3 3-3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        URL / Link
      </div>
      <div class="col-label"></div>
    </div>
    <div class="row-list" id="row-list"></div>
    <div class="empty-state" id="empty-state">No clients yet — add one below</div>
  </div>

  <div class="actions">
    <button class="btn btn-add" onclick="addRow()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      Add client
    </button>
    <button class="btn btn-save" onclick="saveToFile()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 3h8l2 2v7H2V3zM4 3V1h6v2M5 8h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Save as file
    </button>
    <div class="divider-line"></div>
    <button class="btn btn-refresh" onclick="refreshAll()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7a5 5 0 1 0 1-3M2 4V1M2 4H5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Refresh all
    </button>
    <button class="btn btn-close" onclick="closeAll()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      Close all
    </button>
    <button class="btn btn-launch" onclick="launchAll()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Launch all
    </button>
  </div>

  <div class="footer-note">
    <div class="dot"></div>
    data saved in browser · works offline · no account needed · powered by Trace AgTech
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let rows = [];
  let openedWindows = [];

  function loadFromStorage() {
    try {
      const saved = localStorage.getItem('trace-launcher-rows');
      if (saved) rows = JSON.parse(saved);
    } catch(e) {}
    if (rows.length === 0) {
      rows = [{ name: '', url: '' }, { name: '', url: '' }, { name: '', url: '' }];
    }
    renderAll();
  }

  function saveToStorage() {
    try { localStorage.setItem('trace-launcher-rows', JSON.stringify(rows)); } catch(e) {}
  }

  function renderAll() {
    const list = document.getElementById('row-list');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';
    if (rows.length === 0) {
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      rows.forEach((row, i) => {
        const el = document.createElement('div');
        el.className = 'link-row';
        el.innerHTML = `
          <input type="text" placeholder="e.g. Acme Farms" value="${esc(row.name)}"
            oninput="rows[${i}].name=this.value; updateStats(); saveToStorage()">
          <input type="url" class="url-input" placeholder="https://..." value="${esc(row.url)}"
            oninput="rows[${i}].url=this.value; updateStats(); saveToStorage()">
          <button class="del-btn" onclick="removeRow(${i})" title="Remove">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        `;
        list.appendChild(el);
      });
    }
    updateStats();
  }

  function esc(s) {
    return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  }

  function updateStats() {
    document.getElementById('count').textContent = rows.length;
    const valid = rows.filter(r => r.url && r.url.startsWith('http')).length;
    document.getElementById('valid-count').textContent = valid;
  }

  function addRow() {
    rows.push({ name: '', url: '' });
    saveToStorage();
    renderAll();
    setTimeout(() => {
      const inputs = document.querySelectorAll('.link-row input');
      if (inputs.length) inputs[inputs.length - 2].focus();
    }, 50);
  }

  function removeRow(i) {
    rows.splice(i, 1);
    saveToStorage();
    renderAll();
    toast('Removed');
  }

  function launchAll() {
    syncInputValues();
    const valid = rows.filter(r => r.url && r.url.trim().startsWith('http'));
    if (!valid.length) { toast('No valid URLs to launch'); return; }
    openedWindows = [];
    valid.forEach(r => {
      const w = window.open(r.url.trim(), '_blank');
      if (w) openedWindows.push(w);
    });
    toast('Launching ' + valid.length + ' tab' + (valid.length > 1 ? 's' : '') + '...');
  }

  function refreshAll() {
    syncInputValues();
    const valid = rows.filter(r => r.url && r.url.trim().startsWith('http'));
    if (!valid.length) { toast('No valid URLs to refresh'); return; }
    // Try refreshing tracked windows first
    let refreshed = 0;
    openedWindows.forEach(w => {
      try { if (w && !w.closed) { w.location.reload(); refreshed++; } } catch(e) {}
    });
    // If no tracked windows, reopen all
    if (refreshed === 0) {
      openedWindows = [];
      valid.forEach(r => {
        const w = window.open(r.url.trim(), '_blank');
        if (w) openedWindows.push(w);
      });
      toast('Reopening ' + valid.length + ' tab' + (valid.length > 1 ? 's' : '') + '...');
    } else {
      toast('Refreshed ' + refreshed + ' tab' + (refreshed > 1 ? 's' : '') + '');
    }
  }

  function closeAll() {
    let closed = 0;
    openedWindows.forEach(w => {
      try { if (w && !w.closed) { w.close(); closed++; } } catch(e) {}
    });
    openedWindows = [];
    if (closed > 0) {
      toast('Closed ' + closed + ' tab' + (closed > 1 ? 's' : ''));
    } else {
      toast('No tracked tabs to close — launch first');
    }
  }

  function syncInputValues() {
    document.querySelectorAll('.link-row').forEach((el, i) => {
      const inputs = el.querySelectorAll('input');
      if (inputs[0]) rows[i].name = inputs[0].value;
      if (inputs[1]) rows[i].url = inputs[1].value;
    });
  }

  function saveToFile() {
    syncInputValues();
    const validRows = rows.filter(r => r.url && r.url.trim().startsWith('http'));
    if (!validRows.length) { toast('Add at least one URL first'); return; }

    const tableRows = validRows.map(r =>
      `<tr><td>${r.name || '—'}</td><td><a href="${r.url}" target="_blank">${r.url}</a></td></tr>`
